services:
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  aegisrl-1:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      - REDIS_ADDR=redis:6379
      - LISTEN_ADDR=:8081
      - METRICS_ADDR=:9100
      - CAPACITY=100
      - REFILL_RATE=10
      - LOG_LEVEL=info
      - DASHBOARD_ORIGIN=http://localhost:3000
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  aegisrl-2:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      - REDIS_ADDR=redis:6379
      - LISTEN_ADDR=:8082
      - METRICS_ADDR=:9101
      - CAPACITY=100
      - REFILL_RATE=10
      - LOG_LEVEL=info
      - DASHBOARD_ORIGIN=http://localhost:3000
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - aegisrl-1
      - aegisrl-2
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - aegisrl-1
      - aegisrl-2
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  prometheus_data:
